name: Release
run-name: "Release ${{ github.event.release.tag_name }}"

on:
  release:
    types: [ published ]

env:
  BUILD_TYPE: Release

jobs:
  release-webos:
    name: Release (webOS)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download ares-cli-rs
        uses: robinraju/release-downloader@v1.9
        with:
          repository: "webosbrew/ares-cli-rs"
          latest: true
          fileName: "ares-package_*_amd64.deb"
          out-file-path: "temp"

      - name: Download Manifest Generator
        uses: robinraju/release-downloader@v1.9
        with:
          repository: "webosbrew/dev-toolbox-cli"
          latest: true
          fileName: "webosbrew-toolbox-gen-manifest_*_amd64.deb"
          out-file-path: "temp"

      - name: Update Packages
        run: sudo apt-get -yq update

      - name: Install webOS CLI
        run: sudo apt-get install ./temp/*.deb

      - name: webOS Build
        uses: ./.github/actions/build-webos
        with:
          build-type: RelWithDebInfo

      - name: Validate Homebrew Manifest Against Schema
        shell: bash
        run: |
          set -euo pipefail
          MANIFEST_FILE=$(ls dist/*.manifest.json)
          echo "Validating ${MANIFEST_FILE}"
          curl -sSL -o /tmp/HomebrewPackageManifest.schema.json \
            https://raw.githubusercontent.com/webosbrew/docs/main/schemas/HomebrewPackageManifest.schema.json
          npx --yes ajv-cli@5 validate \
            -s /tmp/HomebrewPackageManifest.schema.json \
            -d "${MANIFEST_FILE}" \
            --strict=false

      - name: Create Release (webOS)
        id: create_release_webos
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.event.release.tag_name }}
          allowUpdates: true
          omitNameDuringUpdate: true
          omitBody: true
          omitPrereleaseDuringUpdate: true
          artifacts: dist/*.ipk,dist/*_dbgsym.tar.gz,dist/*.manifest.json
