description: |
  **Aurora** is a fork of [Moonlight TV](https://github.com/mariotaku/moonlight-tv) for LG webOS (C1–C5 and similar),
  focused on **4K 120fps HDR** streaming with Sunshine / GameStream hosts.

  ![GitHub Release](https://img.shields.io/github/v/release/GuiDev1994/aurora-tv)
  ![GitHub Downloads](https://img.shields.io/github/downloads/GuiDev1994/aurora-tv/total)

  ## Notes

  * App ID: `com.aurora.gamestream` (separate from store / Homebrew **Moonlight** `com.limelight.webos`).
  * Releases: [github.com/GuiDev1994/aurora-tv/releases](https://github.com/GuiDev1994/aurora-tv/releases)

  ## Highlights

  * High bitrate option (up to 300 Mbps — use responsibly on Wi‑Fi).
  * HDR10 (PQ) over HEVC Main10 or AV1 Main10 when the host sends HDR.
  * Optional **Tight display sync** (webOS Starfish) and optional **AV1** in Settings → Video.

